name: Continuous Deployment

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      version:
        description: 'Version to deploy'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Build and push container images
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=tag
          type=sha,prefix={{branch}}-
    
    - name: Build and push
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Output image
      id: image
      run: |
        echo "image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

  # Deploy to staging
  deploy-staging:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'staging' || github.event_name == 'release'
    environment:
      name: staging
      url: https://seagent-staging.example.com
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Configure kubectl
      run: |
        # Configure kubectl for staging cluster
        echo "Configuring kubectl for staging..."
        # kubectl config set-context staging --cluster=staging --user=github-actions
    
    - name: Deploy to staging
      run: |
        echo "Deploying SEAgent to staging..."
        echo "Image: ${{ needs.build.outputs.image }}"
        
        # Update deployment with new image
        # kubectl set image deployment/seagent seagent=${{ needs.build.outputs.image }} -n staging
        
        # Apply any configuration changes
        # kubectl apply -f k8s/staging/ -n staging
        
        # Wait for rollout to complete
        # kubectl rollout status deployment/seagent -n staging --timeout=300s
    
    - name: Run staging tests
      run: |
        echo "Running staging smoke tests..."
        sleep 30  # Wait for deployment to stabilize
        
        # Health check
        # curl -f https://seagent-staging.example.com/health
        
        # API tests
        # curl -f https://seagent-staging.example.com/api/v1/agents/status
    
    - name: Update staging status
      if: always()
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Staging deployment successful"
        else
          echo "❌ Staging deployment failed"
        fi

  # Deploy to production
  deploy-production:
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: |
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'production') ||
      (github.event_name == 'release' && github.event.action == 'published')
    environment:
      name: production
      url: https://seagent.example.com
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Configure kubectl
      run: |
        echo "Configuring kubectl for production..."
        # Configure production cluster access
    
    - name: Pre-deployment checks
      run: |
        echo "Running pre-deployment checks..."
        
        # Check staging health
        # curl -f https://seagent-staging.example.com/health
        
        # Verify image vulnerability scan passed
        echo "Verifying security scans..."
    
    - name: Deploy to production
      run: |
        echo "Deploying SEAgent to production..."
        echo "Image: ${{ needs.build.outputs.image }}"
        
        # Blue-green deployment strategy
        echo "Starting blue-green deployment..."
        
        # Update green deployment
        # kubectl set image deployment/seagent-green seagent=${{ needs.build.outputs.image }} -n production
        
        # Wait for green to be ready
        # kubectl rollout status deployment/seagent-green -n production --timeout=600s
        
        # Run health checks on green
        echo "Health checking green deployment..."
        
        # Switch traffic to green
        # kubectl patch service seagent -p '{"spec":{"selector":{"version":"green"}}}' -n production
        
        # Scale down blue
        # kubectl scale deployment seagent-blue --replicas=0 -n production
    
    - name: Post-deployment verification
      run: |
        echo "Running post-deployment verification..."
        sleep 60  # Wait for traffic switch
        
        # Comprehensive health checks
        # curl -f https://seagent.example.com/health
        # curl -f https://seagent.example.com/api/v1/agents/status
        
        # Performance verification
        echo "Verifying performance metrics..."
    
    - name: Rollback on failure
      if: failure()
      run: |
        echo "🚨 Production deployment failed - initiating rollback..."
        
        # Switch traffic back to blue
        # kubectl patch service seagent -p '{"spec":{"selector":{"version":"blue"}}}' -n production
        
        # Scale blue back up
        # kubectl scale deployment seagent-blue --replicas=3 -n production
        
        echo "Rollback completed"
    
    - name: Notify deployment status
      if: always()
      run: |
        if [ $? -eq 0 ]; then
          echo "✅ Production deployment successful"
          # Send success notification
        else
          echo "❌ Production deployment failed"
          # Send failure notification
        fi

  # Database migrations (if needed)
  migrate:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Run database migrations
      run: |
        echo "Running database migrations..."
        
        # Connect to database and run migrations
        # alembic upgrade head
        
        echo "Migrations completed"

  # Update documentation
  update-docs:
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.event_name == 'release'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Update deployment documentation
      run: |
        echo "Updating deployment documentation..."
        
        # Update deployment logs
        echo "Deployment completed at $(date)" >> DEPLOYMENT_LOG.md
        echo "Version: ${{ github.ref_name }}" >> DEPLOYMENT_LOG.md
        echo "Image: ${{ needs.build.outputs.image }}" >> DEPLOYMENT_LOG.md
    
    - name: Create deployment summary
      run: |
        cat << EOF > deployment-summary.md
        # Deployment Summary
        
        ## Release: ${{ github.ref_name }}
        - **Deployed at**: $(date)
        - **Image**: \`${{ needs.build.outputs.image }}\`
        - **Environment**: Production
        - **Status**: ✅ Successful
        
        ## Changes in this release
        $(cat CHANGELOG.md | head -20)
        
        ## Health Check
        - API Status: ✅ Healthy
        - Database: ✅ Connected
        - Agents: ✅ All Online
        EOF
    
    - name: Upload deployment artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deployment-summary
        path: deployment-summary.md